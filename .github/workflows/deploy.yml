name: Deploy website to S3

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync src/ to S3
        run: |
          # 1. Upload images, JS, and CSS with long caching (1 year)
          # These files usually have unique hashes in their names (e.g., main.a1b2c3.js)
          aws s3 sync src/ s3://rinsesoft-website --delete \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable"

          # 2. Upload HTML files with NO caching
          # This ensures users always get the latest version of your page immediately
          aws s3 sync src/ s3://rinsesoft-website --delete \
            --exclude "*" --include "*.html" \
            --cache-control "no-cache"
