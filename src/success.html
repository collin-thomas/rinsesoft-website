<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Received | Rinsesoft</title>
  <meta name="description" content="Thank you for reaching out to Rinsesoft.">
  <meta property="og:image" content="https://rinsesoft.com/img/og-image.jpg">
  <meta property="og:image:type" content="image/svg+xml">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://rinsesoft.com/img/og-image.jpg">
  <meta property="og:title" content="Rinsesoft — We treat technology as a financial asset">
  <meta property="og:description"
    content="Rinsesoft helps mid-market firms eliminate operational drag and protect margins through strategic systems architecture.">
  <meta name="twitter:title" content="Rinsesoft — We treat technology as a financial asset">
  <meta name="twitter:description"
    content="Rinsesoft helps mid-market firms eliminate operational drag and protect margins through strategic systems architecture.">

  <!-- Optimized Font Loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Preload the font CSS with proper cross-origin attributes and display=swap -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap">

  <!-- Use the 'print' media trick to prevent render blocking while ensuring swap is enabled -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    media="print" onload="this.media='all'">

  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap">
  </noscript>

  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #141414;
      --accent: #ccff00;
      --text-main: #e5e5e5;
      --text-dim: #a3a3a3;
      --border: #262626;
      --max-width: 1100px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    .container {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-weight: 900;
      font-size: 1.15rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      font-style: italic;
      color: #fff;
      display: flex;
      align-items: center;
    }

    .logo span {
      color: var(--accent);
    }

    .message {
      margin: 10rem 0;
      text-align: left;
      max-width: 760px;
    }

    h1 {
      font-size: clamp(2.25rem, 10vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 1.5rem;
      line-height: 1.1;
    }

    p.lead {
      color: var(--text-dim);
      font-size: 1.25rem;
      margin-bottom: 3rem;
      max-width: 600px;
    }

    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .button {
      background: var(--accent);
      color: #000;
      padding: 1.125rem 2rem;
      border-radius: 4px;
      font-weight: 800;
      text-decoration: none;
      font-size: 0.875rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    footer {
      margin-top: 6rem;
      padding: 4rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.75rem;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <div class="logo">RINSE<span>SOFT</span></div>
      <nav>
        <a href="/"
          style="text-decoration:none; color:var(--text-main); font-weight:600; font-size:0.75rem; letter-spacing:0.1em;">HOME</a>
      </nav>
    </header>

    <main>
      <section class="message">
        <h1>Thank you.</h1>
        <p class="lead">We have received your request. Our team will review your details and contact you within 48 hours
          to discuss the next steps.</p>
        <div class="actions">
          <a class="button" href="/">Return to Home</a>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; <span id="year">2026</span> Rinsesoft. All rights reserved.</p>
    </footer>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const yearElement = document.getElementById('year');
      const currentYear = new Date().getFullYear();
      yearElement.textContent = Math.max(2026, currentYear);
    });
  </script>
</body>

</html>
